<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <title>Golden Hope Logo</title>
  <desc>Golden Hope — 金希珠宝 — Lotus emblem with Chinese and English wordmark</desc>

  <!-- Transparent background (works on both light and dark) -->

  <!-- ── Lotus petals layer 1 (outer, soft) ── -->
  <g transform="translate(200, 175)">
    <ellipse cx="0" cy="38" rx="18" ry="52" fill="#C9A84C" opacity="0.22" transform="rotate(-60)"/>
    <ellipse cx="0" cy="38" rx="18" ry="52" fill="#C9A84C" opacity="0.22" transform="rotate(-36)"/>
    <ellipse cx="0" cy="38" rx="18" ry="52" fill="#C9A84C" opacity="0.22" transform="rotate(-12)"/>
    <ellipse cx="0" cy="38" rx="18" ry="52" fill="#C9A84C" opacity="0.22" transform="rotate(12)"/>
    <ellipse cx="0" cy="38" rx="18" ry="52" fill="#C9A84C" opacity="0.22" transform="rotate(36)"/>
    <ellipse cx="0" cy="38" rx="18" ry="52" fill="#C9A84C" opacity="0.22" transform="rotate(60)"/>

    <!-- ── Lotus petals layer 2 (mid, richer) ── -->
    <ellipse cx="0" cy="32" rx="14" ry="42" fill="#C9A84C" opacity="0.55" transform="rotate(-48)"/>
    <ellipse cx="0" cy="32" rx="14" ry="42" fill="#C9A84C" opacity="0.55" transform="rotate(-24)"/>
    <ellipse cx="0" cy="32" rx="14" ry="42" fill="#C9A84C" opacity="0.55" transform="rotate(0)"/>
    <ellipse cx="0" cy="32" rx="14" ry="42" fill="#C9A84C" opacity="0.55" transform="rotate(24)"/>
    <ellipse cx="0" cy="32" rx="14" ry="42" fill="#C9A84C" opacity="0.55" transform="rotate(48)"/>

    <!-- ── Lotus petals layer 3 (inner, solid) ── -->
    <ellipse cx="0" cy="24" rx="10" ry="30" fill="#B8962E" opacity="0.9" transform="rotate(-36)"/>
    <ellipse cx="0" cy="24" rx="10" ry="30" fill="#B8962E" opacity="0.9" transform="rotate(-12)"/>
    <ellipse cx="0" cy="24" rx="10" ry="30" fill="#B8962E" opacity="0.9" transform="rotate(12)"/>
    <ellipse cx="0" cy="24" rx="10" ry="30" fill="#B8962E" opacity="0.9" transform="rotate(36)"/>

    <!-- ── Center gem ── -->
    <circle cx="0" cy="0" r="22" fill="#8B6914"/>
    <circle cx="0" cy="0" r="15" fill="#C9A84C"/>
    <circle cx="0" cy="0" r="9"  fill="#F5E6C0"/>
    <circle cx="0" cy="0" r="4"  fill="#8B6914"/>
  </g>

  <!-- ── Decorative thin ring around bloom ── -->
  <circle cx="200" cy="175" r="68" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>

  <!-- ── Diamond accents (four directions) ── -->
  <polygon points="200,98  204,106  200,114  196,106" fill="#C9A84C" opacity="0.7"/>
  <polygon points="200,236 204,244 200,252 196,244" fill="#C9A84C" opacity="0.7"/>
  <polygon points="123,175 131,179 139,175 131,171" fill="#C9A84C" opacity="0.7"/>
  <polygon points="261,175 269,179 277,175 269,171" fill="#C9A84C" opacity="0.7"/>

  <!-- ── English wordmark ── -->
  <text
    x="200" y="284"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="bold"
    fill="#8B6914"
    letter-spacing="6">GOLDEN HOPE</text>

  <!-- ── Thin gold rules flanking Chinese ── -->
  <line x1="108" y1="306" x2="168" y2="306" stroke="#C9A84C" stroke-width="0.8"/>
  <line x1="232" y1="306" x2="292" y2="306" stroke="#C9A84C" stroke-width="0.8"/>

  <!-- ── Chinese wordmark ── -->
  <text
    x="200" y="312"
    text-anchor="middle"
    font-family="'Songti SC', 'SimSun', 'STSong', serif"
    font-size="17"
    fill="#C9A84C"
    letter-spacing="8">金希珠宝</text>

  <!-- ── Tagline ── -->
  <text
    x="200" y="342"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="11"
    fill="#9E7E3A"
    letter-spacing="2.5">HANDCRAFTED WITH PURPOSE</text>
</svg>
